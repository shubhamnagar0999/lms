<!DOCTYPE html>
<html>
<head>
  <title>Student Player</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 300px;
      background: #1e293b;
      color: white;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .course-btn {
      width: 100%;
      background: #334155;
      color: white;
      border: none;
      padding: 8px;
      margin-bottom: 5px;
      text-align: left;
      cursor: pointer;
      border-radius: 5px;
    }

    .lesson-btn {
      width: 100%;
      background: #475569;
      color: white;
      border: none;
      padding: 6px;
      margin-bottom: 4px;
      text-align: left;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .lesson-btn.active {
      background: #22c55e;
    }

    .player {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
    }

    video {
      width: 80%;
      max-width: 900px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .logout {
      background: red;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      float: right;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <button class="logout" onclick="logout()">Logout</button>
    <h2>My Courses</h2>
    <div id="courseContainer"></div>
  </div>

  <div class="player">
    <video id="video" controls></video>
  </div>

  <script>
    const API = "http://localhost:5000";
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "student-login.html";
    }

    const video = document.getElementById("video");
    const courseContainer = document.getElementById("courseContainer");

    let currentLesson = null;
    let activeButton = null;

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "student-login.html";
    }

    async function loadCourses() {
      try {
        const res = await fetch(`${API}/api/student/courses`, {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error("Unauthorized");

        const result = await res.json();
        const courses = result.data;

        courseContainer.innerHTML = "";

        courses.forEach(course => {
          const courseBtn = document.createElement("button");
          courseBtn.innerText = course.name;
          courseBtn.className = "course-btn";

          const lessonDiv = document.createElement("div");
          lessonDiv.style.display = "none";
          lessonDiv.style.marginLeft = "10px";

          courseBtn.onclick = () => {
            lessonDiv.style.display =
              lessonDiv.style.display === "none" ? "block" : "none";
          };

          course.lessons.forEach(lesson => {
            const lessonBtn = document.createElement("button");
            lessonBtn.innerText = lesson.title;
            lessonBtn.className = "lesson-btn";

            lessonBtn.onclick = () => {
              loadLesson(lesson);

              if (activeButton) {
                activeButton.classList.remove("active");
              }

              lessonBtn.classList.add("active");
              activeButton = lessonBtn;
            };

            lessonDiv.appendChild(lessonBtn);
          });

          courseContainer.appendChild(courseBtn);
          courseContainer.appendChild(lessonDiv);
        });

      } catch (err) {
        alert("Session expired. Please login again.");
        logout();
      }
    }

    async function loadLesson(lesson) {
      currentLesson = lesson;
      video.src = lesson.videoUrl;

      try {
        const progressRes = await fetch(
          `${API}/api/student/progress/${lesson.id}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );

        if (progressRes.ok) {
          const progressData = await progressRes.json();
          video.currentTime = progressData.data?.watchedTime || 0;
        }

      } catch {
        video.currentTime = 0;
      }
    }
    setInterval(async () => {
      if (!currentLesson || video.paused) return;

      try {
        await fetch(`${API}/api/student/progress`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({
            lessonId: currentLesson.id,
            watchedTime: Math.floor(video.currentTime),
            deltaTime: 3
          })
        });
      } catch {}
    }, 5000);

    loadCourses();
  </script>

</body>
</html>
